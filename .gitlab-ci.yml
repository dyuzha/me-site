variables:
  APP_DIR: /opt/docker/me-site
  IMAGE_TAG_SHA: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  IMAGE_TAG_LATEST: $CI_REGISTRY_IMAGE:latest
  IMAGE_TAG_COMMIT: $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG


stages:
  - build
  - deploy


.deploy_template:
  stage: deploy
  script:
    - ssh -o StrictHostKeyChecking=no  $DEPLOY_USER@$DEPLOY_HOST "
      docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY &&
      cd $APP_DIR &&
      IMAGE_NAME=$CI_REGISTRY_IMAGE IMAGE_TAG=$DEPLOY_IMAGE_TAG docker compose pull &&
      IMAGE_NAME=$CI_REGISTRY_IMAGE IMAGE_TAG=$DEPLOY_IMAGE_TAG docker compose up -d &&
      docker image prune -f
     "

.build_logic:
  stage: build
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - |
      if docker pull $IMAGE_TAG_SHA; then
        echo "Image already exists in registry. Skipping build and re-tagging..."
      else
        echo "Image not found. Building from scratch..."
        docker build -t $IMAGE_TAG_SHA .
        docker push $IMAGE_TAG_SHA
      fi


build_job:
  extends: .build_logic
  script:

    # Если это тег - вешаем тег версии
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        docker tag $IMAGE_TAG_SHA $IMAGE_TAG_COMMIT
        docker push $IMAGE_TAG_COMMIT
      fi

    # Если это main — вешаем тег latest
    - |
      if [ "$CI_COMMIT_BRANCH" == "main" ]; then
        docker tag $IMAGE_TAG_SHA $IMAGE_TAG_LATEST
        docker push $IMAGE_TAG_LATEST
      fi

  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "stage"
    - if: $CI_COMMIT_BRANCH == "main"


deploy_stage:
  extends: .deploy_template
  environment:
    name: stage
    url: https://stage.dyuzha.ru
  variables:
    DEPLOY_HOST: $STAGE_HOST
    DEPLOY_USER: $STAGE_USER
    DEPLOY_IMAGE_TAG: $CI_COMMIT_SHORT_SHA
  rules:
    - if: '$CI_COMMIT_BRANCH == "stage"'


deploy_prod:
  extends: .deploy_template
  environment:
    name: prod
    url: https://dyuzha.ru
  variables:
    DEPLOY_HOST: $PROD_HOST
    DEPLOY_USER: $PROD_USER
    DEPLOY_IMAGE_TAG: $CI_COMMIT_TAG
  rules:
    - if: $CI_COMMIT_TAG
