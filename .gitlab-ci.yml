stages:
  - deploy

variables:
  APP_DIR: /opt/docker/me-site

.deploy_template:
  stage: deploy
  # before_script:
  #   - eval $(ssh-agent -s)
  #   - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
  script:
    - ssh $DEPLOY_USER@$DEPLOY_HOST "
      cd $APP_DIR &&
      git pull &&
      docker compose up -d
     "

deploy_stage:
  extends: .deploy_template
  tags:
    - PVE
  variables:
    DEPLOY_HOST: $STAGE_HOST
    DEPLOY_USER: $STAGE_USER
  rules:
    - if: '$CI_COMMIT_BRANCH == "stage"'

deploy_prod:
  extends: .deploy_template
  tags:
    - PVE
  variables:
    DEPLOY_HOST: $PROD_HOST
    DEPLOY_USER: $PROD_USER
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
