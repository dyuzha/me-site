seo:
  title: DevOps инженер Дюжев Матвей
  description: DevOps услуги
title: DevOps инженер Дюжев Матвей
description: Разработка, внедрение и сопровождение микросервисных приложений полного цикла.
hero:
  links:
    - label: Подробнее
      icon: i-lucide-arrow-right
      trailing: true
      color: primary
      to: https://ui.nuxt.com/docs/getting-started/installation/nuxt
      target: _blank
      size: xl
    - label: Перейти на GitHub
      icon: i-simple-icons-github
      size: xl
      color: neutral
      variant: outline
      to: https://github.com/dyuzha
      target: _blank
section:
  title: 'Решения [под ключ]{.text-primary}'
  description: Оптимизация процесса разработки и выката в продакшен за счет грамотно выстроенных пайпланов.
  images:
    mobile: '/images/macbook-mobile.svg'
    desktop: '/images/macbook.svg'
  features:

    - title: Настройка CI/CD пайплайнов
      description: Проектирование и настройка CI/CD-пайплайнов для автоматической сборки, тестирования и деплоя приложений, обеспечивающих стабильные и быстрые релизы
      class: border-l border-primary pl-4

    - title: Проектирование архитектуры приложений с упором на тестирование
      description: На этапе разработке приложения, закладывается реализация для облегченного тестирования конретного функционала или всего приложения с тестовыми данными.
      class: border-l border-default pt-4 pl-4

    - title: Визуализация бизнес-процессов
      description: Прозрачность и точность бизнес-процессов - показатель зрелости компании. Автодокументируемые интерактивные dashboard'ы c бизнеспроцессами, позволяют получить  актуальную картину полный контроль над бизнесом.
      class: border-l border-default pt-4 pl-4

    - title: Автоматизация рутинных действий и готовых кейсов
      description: Оптимизация процессов через автоматизацию, повышает безотказность и точность, а также позволяет освободить ресурсы компании.
      class: border-l border-default pt-4 pl-4

    - title: Самодокументируемые технологии.
      description: Самодокументация позволяет поддерживать актуальную и точную информацию о работе сервисов, не затрачивая ресурсы на составление документации.
      class: border-l border-default pt-4 pl-4


features:
  title: Единая [экосистема]{.text-primary}
  description:  Готовые роли сетевого и серверного оборудования, соединенные в единую инфраструктуру с централизованным управлением

  features:
    - title: Безопасность.
      description: Настройка SSH, SELinux, Firewall, Fail2Ban, ...
      icon: i-lucide-wand-sparkles
      ui:
        leading: bg-accented/50 p-2 rounded-md border border-muted border-dashed

    - title: Контроллер домена
      icon: i-lucide-bell-ring
      ui:
        leading: bg-accented/50 p-2 rounded-md border border-muted border-dashed

    - title: Терминальные сервера
      description: Автоматическое рабочее место, испрользующее ресурсы сервера, позволяющее работать и производить сложные вычислительные процессы с любых устройств.
      icon: i-lucide-code-xml
      ui:
        leading: bg-accented/50 p-2 rounded-md border border-muted border-dashed

    - title: Облачные хранилища
      description: Файлы вашей комании доступные только для вас из любой точки мира. Возможность предоставлять доступ к файлам и каталогам вашим контрагентам или делать их общедоступными.
      icon: i-lucide-moon
      ui:
        leading: bg-accented/50 p-2 rounded-md border border-muted border-dashed
    - title: Комунникации
      description: Телефония, мессенджер, средства для видеоконференции
      icon: i-lucide-mouse-pointer-2
      ui:
        leading: bg-accented/50 p-2 rounded-md border border-muted border-dashed

    - title: CRM-системы
      description: Внедрение и споровождение CRM систем - AmoCRM, Bitrix24... Написание кастомных решений под ваши задачи.
      icon: i-lucide-chart-line
      ui:
        leading: bg-accented/50 p-2 rounded-md border border-muted border-dashed




steps:
  title: Внедрение полного сопровождения за [4 шага]{.text-primary}
  description: Преобразуйте бизнес модель, благодаря IT решениям нового поколения

  items:
    - title: Анализ бизнес-процессов
      description: Мы анализируем текущие бизнес процессы и визуализируем их виде интерактивного графа, отмечая проблемные места и пожелание заказчиков.
      image:
        light: '/images/light/connect.svg'
        dark: '/images/dark/connect.svg'

    - title: Оптимизация бизнес-процессов
      description: После досканального анализа, оптимизируем проблемные зоны. Осуществляем внедрение/модификации необходимых единиц IT-инфраструктуры (База знаний, CRM-системы..)
      image:
        light: '/images/light/optimize.svg'
        dark: '/images/dark/optimize.svg'

    - title: Анализ и планирование модернизации до эко-системы нового поколения.
      description: Имея полную картину всех процессов в компании, производится замена текущих решений на современные аналоги с поддрежкой AI-агентов.
      image:
        light: '/images/light/track.svg'
        dark: '/images/dark/track.svg'

    - title: Внедрение AI-агентов и создание арм ролей компании
      description: На данном шаге, все взаимодействие с ПО будет осуществлятся из единого интерфейса. Сотрудники будут иметь AI-помошников, интерактивные подсказки, обучения... Интерфейс будет сравним с видеоигрой, в которой сотрудники будут копить опыт, проходить квесты и получать награды. Определенные ячейки процессов, будут заменены на AI-агенты, которые будут обучать и контролировать сотрудники, пока AI полностью не станет самостоятельным для данного шага.
      image:
        light: '/images/light/track.svg'
        dark: '/images/dark/track.svg'

pricing:
  title: Choose your [productivity]{.text-primary} path
  description: Unlock AI-powered coding efficiency with our flexible plans. Whether you're a solo developer or part of a team, we have the perfect toolset to maximize your development workflow.
  plans:
    - title: Pro Developer
      description: Perfect for individual developers focused on maximizing productivity.
      price: $199
      features:
        - AI productivity tracking to optimize your peak coding hours
        - Smart distraction alerts to maintain deep focus
        - Personal code snippet library for faster development
        - Deep Work Mode with Pomodoro timer integration
        - Performance analytics dashboard
        - Priority email support
      button:
        label: Buy now
        color: neutral
        variant: outline
        to: '#'
    - title: Team Developer
      description: For bootstrappers and indie hackers.
      price: $199
      features:
        - Everything in Pro Developer
        - Team productivity analytics and insights
        - Collaborative code snippet sharing
        - Cross-team performance tracking
        - Synchronized deep work sessions
        - Priority team support with dedicated manager
      button:
        label: Buy now
        variant: subtle
        to: '#'
