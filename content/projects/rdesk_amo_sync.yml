git: https://github.com/dyuzha/amo-services
description: 'Плагин для SaaS AmoCRM для интеграции с СПК Здравница, реализущий двухсторонюю передачу данных. Решение выполненно в виде TS приложения для AmoCRM, реализующим отправку и визуализацию данных; Серверная часть выполненна в виде podа из двух контейнеров: nginx для проксирования и разработанный pythone сервер, реализующий получение, обработку и передачу данных в AmoCRM через 2.0Auth.'
