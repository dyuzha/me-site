img: /images/service-bot.png
title: Сервис бот.
git: https://github.com/dyuzha/glpi_bot
description: |
  Телеграмм бот для взаимодействия с Service Desk - системы учета заявок.
  Позволяет создавать и просматривать запросы и инциденты пользователей через интерфейс бота.
theme:
  green: '#6DBD7E'
  blue: '#7DCAE0'
  yellow: '#F4BB69'
  red: '#DA7071'
  white: '#F0F2F1'
  black: '#252A37'
  primary: '#374B5E'
  secondary: '#252A37'

extend:
  title: 'Интеграции'
  components:

    - title: 'IMAP'
      description: 'Протокол IMAP используется для авторизации пользователя по почте.'
      icon: 'i-lucide-mail'
      badges:
        - color: 'white'
          label: 'imap'

    - title: 'DB'
      description: |
        SQLite - хранит соответствие Почта : telegram-id : ldap-account

      icon: 'i-lucide-database-zap'
      badges:
        - color: 'white'
          label: 'SQLite'

    - title: 'GLPI'
      description: |
        Взаимодействие с GLPI service-desk осуществляется через REST-API.
      icon: 'i-lucide-headset'
      badges:
        - color: 'white'
          label: 'REST'

    - title: 'LDAP'
      description: |
        Используется для проверки существования почты в домене. Данная интеграция была добавлена для дальнейшего маштабирования (Предоставление вариантов ответа на основе групп пользователя).

        Так как был реализован FastAPI сервер подключенный к LDAP. TG-бот использует его интерфейс для взаимодействия с LDAP.

        Решение раздуто и не имело целесообразности, в следствии чего, в новых версиях, LDAP не используется, проверка почты осуществляется через GLPI-API.

      icon: 'i-lucide-folder-input'
      badges:
        - color: 'white'
          label: 'ldap'
        - color: 'white'
          label: 'fast-api'

accordion:
  title: Проблемы которые решает бот и особенности реализации
  items:
    - label: Не структурированные заявки
      icon: i-lucide-form
      content: |
        Пользователи не проставляют категории и подробно не описывают проблематику. Создавая заявку через данный сервис, пользователь отвечает на ряд простых вопросов, с выбором варианта ответа, после чего, **категория** выставляется автоматически.
        Также, в конфигурационном файле, можно настроить минимальную длину описания заявки, вынуждая пользователя, потратить больше букв...


    - label: Авторизация, только для пользователей комании
      icon: i-lucide-key-round
      content: |
        Вместо ручного ввода *telegram-id* каждого пользователя администратором реализована полноценная *авторизация* по корпоративной почте.


    - label: Использование вне корпоративной сети.
      icon: i-lucide-globe
      content: |
        *Telegram*, в отличии от **Service desk** доступен вне корпоративной сети, что позволяет создавать заявки из **любой точки мира**.
